<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Tracker Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: var(--tg-theme-button-color, #3390ec);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #222222);
            font-size: 16px;
        }
        .result-box {
            background-color: #e8f4fd;
            border-left: 4px solid #3390ec;
            padding: 12px;
            margin: 15px 0;
            border-radius: 4px;
            font-weight: bold;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            opacity: 0.9;
        }
        #statusMessage {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Log Sale / Payment</h2>
    
    <div class="form-group">
        <label for="customerName">Customer Name:</label>
        <input type="text" id="customerName" placeholder="e.g. John Doe">
    </div>

    <div class="form-group">
        <label for="totalCost">Total Item Cost ($):</label>
        <input type="number" id="totalCost" placeholder="0.00" oninput="calculateBalance()">
    </div>

    <div class="form-group">
        <label for="amountPaid">Amount Paid Today ($):</label>
        <input type="number" id="amountPaid" placeholder="0.00" oninput="calculateBalance()">
    </div>

    <div class="result-box">
        Remaining Balance Owed: $<span id="remainingBalance">0.00</span>
    </div>

    <button onclick="submitToSheets()">Submit to Log Book</button>
    
    <div id="statusMessage"></div>
</div>

<script>
    // Initialize Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand(); // Expands app to full screen in Telegram

    // Automatically calculate the remaining balance as they type
    function calculateBalance() {
        const total = parseFloat(document.getElementById('totalCost').value) || 0;
        const paid = parseFloat(document.getElementById('amountPaid').value) || 0;
        const balance = total - paid;
        
        document.getElementById('remainingBalance').innerText = balance.toFixed(2);
    }

    // Send the data directly to your SheetDB API URL
    function submitToSheets() {
        const name = document.getElementById('customerName').value;
        const total = document.getElementById('totalCost').value;
        const paid = document.getElementById('amountPaid').value;
        const balance = document.getElementById('remainingBalance').innerText;
        const status = document.getElementById('statusMessage');
        // Simple validation to make sure fields aren't empty
        if (!name ||!totsl|| !paid) {
            status.style.color = "red";
            status.innerText = "Please fill in all fields.";
            return;
        }

        status.style.color = "orange";
        status.innerText = "Sending to log book...";

        // Get today's date and time
        const today = new Date().toLocaleString();

        // Put your exact SheetDB API link below inside the quotation marks:
        const sheetDbUrl = "https://sheetdb.io/api/v1/imabkvc4hn7d3"; 

        // Prepare the payload matching your Google Sheets column names exactly
        const dataPayload = {
            "data": [
                {
                    "Date": today,
                    "Customer Name": name,
                    "Total Cost": total,
                    "Amount Paid": paid,
                    "Remaining Balance": balance
                }
            ]
        };

        // Make the background request to update your Google Sheet
        fetch(sheetDbUrl, {
            method: 'POST',
            headers: {
                'Accept': 'application/json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dataPayload)
        })
        .then(response => response.json())
        .then(data => {
            if(data.created === 1) {
                status.style.color = "green";
                status.innerText = "✓ Successfully Logged!";
                
                // Reset inputs for the next transaction
                document.getElementById('customerName').value = '';
                document.getElementById('totalCost').value = '';
                document.getElementById('amountPaid').value = '';
                document.getElementById('remainingBalance').innerText = '0.00';
                
                // Let the user know it succeeded via Telegram haptic feedback if available
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                status.style.color = "red";
                status.innerText = "Error saving. Double check your API settings.";
            }
        })
        .catch(error => {
            console.error('Error:', error);
            status.style.color = "red";
            status.innerText = "Network error. Try again.";
        });
    }
</script>

</body>
</html>
